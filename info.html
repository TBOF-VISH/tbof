<style>
:root{--green:#243E10;--green3:#3D6B1F;--cream:#E8D99A;--bg:#F7F4EC;--border:#C8D4B0;--text:#1A1A1A;--muted:#7A8A6A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:"Barlow",sans-serif;color:var(--text);min-height:100vh;}
.wrap{max-width:460px;margin:0 auto;padding:20px 16px 30px;}
.box{background:#FDFAF3;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 3px 16px rgba(36,62,16,.09);}
.box-bar{height:6px;background:linear-gradient(90deg,var(--green),var(--green3));}
.box-header{background:var(--green);padding:14px 20px 13px;}
.box-title{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--cream);}
.loading-state{padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--green);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--muted);font-weight:500;}
.error-state{padding:30px 20px;text-align:center;font-size:13px;color:#7A3A00;line-height:1.6;display:none;}
.addr-block{padding:12px 18px 14px;}
.addr-divider{height:1px;background:var(--border);margin:0 18px;}
.facility-code-line{font-size:11px;font-weight:400;color:var(--muted);margin-bottom:4px;}
.company-name,.addr-line{font-size:13.5px;font-weight:400;color:var(--text);line-height:1.35;}
.fssai-section{margin-top:0;text-align:center;}
.fssai-logo{display:block;height:65px;width:auto;margin:0 auto;object-fit:contain;mix-blend-mode:multiply;}
.lic-no{font-size:13.5px;font-weight:400;color:var(--text);text-align:center;}
</style></head><body>

      var company = String(row.Company_name  || row.company_name  || "");
      var address = String(row.Address       || row.address       || "");
      var fssai   = String(row.fssai         || row.Fssai         || "");

      var b = document.createElement("div");
      b.className = "addr-block";
      b.innerHTML =
        "<div class=\"facility-code-line\">Manufacturing Facility Code: " + code + "</div>" +
        "<div class=\"company-name\">" + company + "</div>" +
        "<div class=\"addr-line\">" + address + "</div>" +
        "<div class=\"fssai-section\">" +
          "<img class=\"fssai-logo\" src=\"" + LOGO + "\" alt=\"fssai\">" +
          "<div class=\"lic-no\">Lic. No. :" + fssai + "</div>" +
        "</div>";
      el.appendChild(b);

      if (i < rows.length - 1) {
        var d = document.createElement("div");
        d.className = "addr-divider";
        el.appendChild(d);
      }
    });
  } catch(e) {
    document.getElementById("content").innerHTML = "";
    document.getElementById("err").style.display = "block";
  }
}
load();

</script></body></html>
